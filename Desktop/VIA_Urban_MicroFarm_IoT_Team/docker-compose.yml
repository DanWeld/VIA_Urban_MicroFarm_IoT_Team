services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: urbanmicrofarm-mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./broker/config:/mosquitto/config
      - ./broker/data:/mosquitto/data
      - ./broker/log:/mosquitto/log
    restart: unless-stopped
