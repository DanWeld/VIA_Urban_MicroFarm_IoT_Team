version: '3.8'

services:
  # Mosquitto MQTT Message Broker
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: urbanmicrofarm-mosquitto
    ports:
      - "1883:1883"    # MQTT protocol
      - "8883:8883"    # MQTT over TLS
      - "9001:9001"    # WebSocket
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    environment:
      - TZ=UTC
    networks:
      - urbanmicrofarm-net
    healthcheck:
      test: mosquitto_sub -h localhost -t '$SYS/broker/version' -E
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Optional: MQTT Simulator for testing (publishes dummy sensor data)
  mqtt-simulator:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.simulator
    container_name: urbanmicrofarm-simulator
    depends_on:
      mosquitto:
        condition: service_healthy
    environment:
      MQTT_BROKER: mosquitto
      MQTT_PORT: 1883
      MQTT_CLIENT_ID: simulator_device_001
      SENSOR_INTERVAL: 5
    networks:
      - urbanmicrofarm-net
    restart: unless-stopped

  # Optional: MQTT Web UI for monitoring
  mqtt-ui:
    image: hivechat/mqtt-ui:latest
    container_name: urbanmicrofarm-mqtt-ui
    ports:
      - "8080:80"
    depends_on:
      - mosquitto
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      MQTT_AWS_END_POINT: mosquitto
    networks:
      - urbanmicrofarm-net

networks:
  urbanmicrofarm-net:
    driver: bridge

volumes:
  mosquitto_data:
  mosquitto_log:
