services:
  # Mosquitto MQTT Message Broker
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: urbanmicrofarm-mosquitto
    ports:
      - "1883:1883" # MQTT protocol
      - "8883:8883" # MQTT over TLS
      - "9001:9001" # WebSocket
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    environment:
      - TZ=UTC
    networks:
      - urbanmicrofarm-net
    healthcheck:
      test: mosquitto_sub -h localhost -t '$SYS/broker/version' -E
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  urbanmicrofarm-net:
    driver: bridge
