; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:megaatmega2560]
platform = atmelavr
board = megaatmega2560
framework = arduino
lib_deps =
    https://github.com/DaveGamble/cJSON 

[env:test]
platform = atmelavr
board = megaatmega2560
framework = arduino

[env:test_windows]
platform = native
;framework = native
lib_deps = throwtheswitch/Unity@^2.5.2
lib_ignore = adc, button, buzzer, dht11, display, led, light, pir, proximity, servo, soil, timer, tone, uart, uart_stdio, wifi, wpump, wpump_controller
build_flags = -D WINDOWS_TEST=1
;build_flags = -DTEST_PLATFORM_WINDOWS
test_filter = test_util_win, test_build_payload_win, test_wpump_win

[env:test_payload_coverage]
platform = native
lib_deps = throwtheswitch/Unity@^2.5.2
lib_ignore = adc, button, buzzer, dht11, display, led, light, pir, proximity, servo, soil, timer, tone, uart, uart_stdio, wifi, wpump, wpump_controller
build_flags =
    -D WINDOWS_TEST=1
    -O0
    -g
    -fprofile-arcs
    -ftest-coverage
    -lgcov
test_filter = test_build_payload_win